syntax = "proto3";
package raft;
option go_package = "kvraft/proto";

// RaftRPC is the internal peer-to-peer service used by Raft nodes.
// Clients never call these RPCs. All communication is node-to-node
// on the peer ports (7100/7101/7102 in nodeconfig.json).

service RaftRPC {
  rpc RequestVote(RequestVoteArgs) returns (RequestVoteReply);
  rpc AppendEntries(AppendEntriesArgs) returns (AppendEntriesReply);

  // InstallSnapshot is only required for the optional Extension (log compaction).
  rpc InstallSnapshot(InstallSnapshotArgs) returns (InstallSnapshotReply);
}

// ── RequestVote ────────────────────────────────────────────────────────────
// Sent by a candidate to collect votes during an election.
// See Raft paper §5.2.

message RequestVoteArgs {
  int64 term           = 1;  // candidate's current term
  int32 candidate_id   = 2;  // candidate requesting vote
  int64 last_log_index = 3;  // index of candidate's last log entry (§5.4)
  int64 last_log_term  = 4;  // term of candidate's last log entry (§5.4)
}

message RequestVoteReply {
  int64 term         = 1;  // currentTerm of the voter (for candidate to update itself)
  bool  vote_granted = 2;  // true if the candidate received this node's vote
}

// ── AppendEntries ──────────────────────────────────────────────────────────
// Sent by the leader to replicate log entries and as a heartbeat (entries=[]).
// See Raft paper §5.3.

message LogEntry {
  int64  index   = 1;  // 1-indexed position in the Raft log
  int64  term    = 2;  // term when the entry was created
  string command = 3;  // encoded KV operation (e.g. "put:foo:bar" or "get:foo")
}

message AppendEntriesArgs {
  int64          term          = 1;  // leader's current term
  int32          leader_id     = 2;  // so followers can redirect clients
  int64          prev_log_index = 3; // index of log entry immediately before new ones
  int64          prev_log_term  = 4; // term of prevLogIndex entry
  repeated LogEntry entries    = 5;  // log entries to store (empty for heartbeat)
  int64          leader_commit = 6;  // leader's commitIndex
}

message AppendEntriesReply {
  int64 term      = 1;  // currentTerm (for leader to update itself)
  bool  success   = 2;  // true if follower contained entry matching prevLogIndex/prevLogTerm
  // Optional optimization: conflict info for fast nextIndex rollback (Raft paper §5.3)
  int64 conflict_index = 3;  // index of first conflicting entry (0 if success)
  int64 conflict_term  = 4;  // term of the conflicting entry (0 if success)
}

// ── InstallSnapshot (optional extension) ──────────────────────────────────
// Sent by the leader to a lagging follower that needs a snapshot instead of
// individual log entries. See Raft paper §7.

message InstallSnapshotArgs {
  int64  term                = 1;
  int32  leader_id           = 2;
  int64  last_included_index = 3;  // snapshot replaces log up through this index
  int64  last_included_term  = 4;  // term of last_included_index
  bytes  data                = 5;  // raw snapshot bytes (serialized KV store state)
}

message InstallSnapshotReply {
  int64 term = 1;  // currentTerm (for leader to update itself)
}
