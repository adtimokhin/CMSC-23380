syntax = "proto3";
package kvstore;
option go_package = "kvstore/proto";

// ── Client-facing service ─────────────────────────────────────────────────
// Clients call Put and Get on whichever node address they know.
// Put must eventually reach the current primary; a non-primary node returns
// redirect_addr so the client can retry. Get may be served by any node
// (reads may be stale on backups — students document the consistency model).

service KVStore {
  rpc Put(PutRequest) returns (PutResponse);
  rpc Get(GetRequest) returns (GetResponse);
  rpc GetPrimary(Empty) returns (GetPrimaryResponse);
}

message Empty {}

message PutRequest {
  string key   = 1;
  string value = 2;
}

message PutResponse {
  bool   ok            = 1;  // true = committed at primary + both backups
  string redirect_addr = 2;  // non-empty when ok=false and caller hit a non-primary
  int64  lamport_ts    = 3;  // Lamport timestamp assigned to this write (when ok=true)
}

message GetRequest {
  string key = 1;
}

message GetResponse {
  bool   found      = 1;
  string value      = 2;
  int64  lamport_ts = 3;  // Lamport timestamp of the write that produced this value
}

message GetPrimaryResponse {
  string primary_addr = 1;  // client-facing address of the current primary
  int32  primary_id   = 2;
}

// ── Internal replication service ─────────────────────────────────────────
// Only nodes call each other on this service. Clients never use these RPCs.

service Replication {
  rpc Replicate(ReplicateRequest) returns (ReplicateResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  rpc AnnounceLeader(AnnounceLeaderRequest) returns (AnnounceLeaderResponse);
}

message ReplicateRequest {
  string key        = 1;
  string value      = 2;
  int64  lamport_ts = 3;  // timestamp assigned by the primary (apply max-rule)
  int32  origin_id  = 4;  // ID of the node acting as primary
}

message ReplicateResponse {
  bool  ok         = 1;
  int64 lamport_ts = 2;  // backup's Lamport clock after applying the max-rule
}

message HeartbeatRequest {
  int32 sender_id  = 1;
  int64 lamport_ts = 2;
  int32 role       = 3;  // 0 = PRIMARY, 1 = BACKUP, 2 = CANDIDATE
}

message HeartbeatResponse {
  int32 sender_id  = 1;
  int64 lamport_ts = 2;
  int32 role       = 3;
}

message AnnounceLeaderRequest {
  int32 new_primary_id    = 1;
  int64 election_lamport  = 2;  // candidate's Lamport clock at election time
}

message AnnounceLeaderResponse {
  bool accepted = 1;  // true if the recipient yields to this candidate
}
