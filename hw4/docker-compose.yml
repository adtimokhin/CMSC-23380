services:
  broker:
    build:
      context: .
      dockerfile: Dockerfile.broker
    ports:
      - "9000:9000"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      - BROKER_ADDR=broker:9000
      - QDRANT_ADDR=qdrant:6334
      - EMBEDDER_CMD=python3 /app/embedder.py
    depends_on:
      - broker
      - qdrant
